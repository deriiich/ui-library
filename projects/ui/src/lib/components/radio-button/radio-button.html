<label class="ui-radio" [class.ui-radio--disabled]="disabled">
  <input
    type="radio"
    class="ui-radio__input"
    [name]="name"
    [value]="value"
    [checked]="checked"
    [disabled]="disabled"
    (change)="onSelect()"
  />
  <span class="ui-radio__control" aria-hidden="true"></span>
  <span class="ui-radio__label">
    <ng-content />
  </span>
</label>
