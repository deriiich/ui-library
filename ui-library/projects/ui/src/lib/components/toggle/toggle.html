<label class="ui-toggle" [class.ui-toggle--disabled]="disabled">
  <input
    type="checkbox"
    class="ui-toggle__input"
    role="switch"
    [checked]="checked"
    [disabled]="disabled"
    (change)="onToggle()"
  />
  <span class="ui-toggle__track" aria-hidden="true">
    <span class="ui-toggle__thumb"></span>
  </span>
  <span class="ui-toggle__label">
    <ng-content />
  </span>
</label>
